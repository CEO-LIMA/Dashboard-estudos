<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Dashboard de Estudos</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/pomodoro.css" />
    <link rel="stylesheet" href="css/todo.css" />
    <link rel="icon" href="data:," />
  </head>
  <body>
    <main class="dashboard-layout">
      <aside id="sidebar">
        <h1 id="tituloDashboard">Dashboard de Estudos</h1>
      </aside>

      <div class="main-content">
        <section id="secao-superior">
          <section class="cronometro">
            <h2 id="timerStatus">Pomodoro Pronto 🎯</h2>

            <div id="cronometro-container">
              <div id="tempoDisplay">25:00</div>

              <div id="painelSetas" class="container-setas">
                <button id="btnAumentar">▲</button>
                <button id="btnDiminuir">▼</button>
              </div>
            </div>

            <div class="controles-container">
              <button id="btnIniciar">Iniciar Ciclo ▶️</button>
              <button id="btnResetar" class="escondido" title="Resetar">
                <i data-lucide="rotate-ccw"></i>
              </button>
            </div>
            <p id="timerPrevisao"></p>
          </section>

          <section class="estatisticas">
            <div class="estatisticas-wrapper">
              <div class="card-estatistica-item">
                <h3>Ciclos Concluídos</h3>
                <p><span id="contadorPainel">0</span></p>
              </div>

              <div class="card-estatistica-item">
                <h3>Tempo de Foco</h3>
                <p>
                  <span id="tempoFocoPainel">0</span>
                  <span class="unidade">min</span>
                </p>
                <small
                  id="tempoFocoOntem"
                  style="
                    display: block;
                    color: #888;
                    font-size: 0.8rem;
                    margin-top: 5px;
                  "
                  >Ontem: 0 min</small
                >
              </div>

              <div class="card-estatistica-item">
                <h3>Dias de Ofensiva</h3>
                <p id="ofensivaPainel">0 🔥</p>
              </div>
            </div>
          </section>
        </section>

        <section id="secao-todo">
          <div class="todo-container">
            <h2>Minhas Tarefas</h2>

            <form class="todo-input-group">
              <input
                type="text"
                id="inputTarefa"
                placeholder="Digite uma nova tarefa..."
                autofocus
              />
              <button type="submit" id="btnAdicionar">Adicionar</button>
            </form>
            <div class="listas-todo-wrapper">
              <div class="bloco-lista">
                <h3>Em Andamento</h3>
                <ul id="listaTarefas"></ul>
              </div>

              <div class="bloco-lista">
                <h3>Concluídas</h3>
                <ul id="listaTarefasConcluidas"></ul>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      // Esse comando lê a página e ativa todos os ícones dinamicamente
      lucide.createIcons();
    </script>

    <script src="js/pomodoro.js"></script>
    <script src="js/todo.js"></script>
  </body>
</html>
